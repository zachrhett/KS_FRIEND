<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F.R.I.E.N.D. Dashboard</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    .dashboard-wrap {
      position: relative;
      width: 100%;
      max-width: 1024px;
      margin: 0 auto;
    }

    .dashboard-wrap img {
      width: 100%;
      display: block;
    }

    .hotspot {
      position: absolute;
      display: block;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .hotspot:hover {
      outline: 3px solid rgba(0, 102, 255, 0.45);
      background: rgba(0, 102, 255, 0.08);
    }
  </style>
</head>

<body>

  <div class="dashboard-wrap">
